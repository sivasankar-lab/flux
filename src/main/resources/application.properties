http.port=80
# ‚îÄ‚îÄ LLM provider: huggingface | grok | ollama ‚îÄ‚îÄ
llm.provider=${LLM_PROVIDER:huggingface}

# ‚îÄ‚îÄ Hugging Face (free cloud) ‚îÄ‚îÄ
huggingface.api-key=${HUGGINGFACE_API_KEY:}
huggingface.model=${HUGGINGFACE_MODEL:meta-llama/Llama-3.3-70B-Instruct}
huggingface.baseurl=${HUGGINGFACE_BASEURL:https://router.huggingface.co}

# ‚îÄ‚îÄ Grok (xAI) cloud ‚îÄ‚îÄ
grok.api-key=${GROK_API_KEY:}
grok.model=${GROK_MODEL:grok-3-mini-fast}
grok.baseurl=${GROK_BASEURL:https://api.x.ai}

# ‚îÄ‚îÄ Ollama (local fallback) ‚îÄ‚îÄ
ollama.baseurl=${OLLAMA_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:deepseek-r1:7b}

server.port=${SERVER_PORT:8080}

# ‚îÄ‚îÄ PostgreSQL ‚îÄ‚îÄ
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/flux}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ‚îÄ‚îÄ JPA / Hibernate ‚îÄ‚îÄ
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ‚îÄ‚îÄ Connection pool ‚îÄ‚îÄ
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ‚îÄ‚îÄ Google Sign-In ‚îÄ‚îÄ
google.client-id=${GOOGLE_CLIENT_ID:}