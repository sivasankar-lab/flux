http.port=80
# ── LLM provider: huggingface | grok | ollama ──
llm.provider=${LLM_PROVIDER:huggingface}

# ── Hugging Face (free cloud) ──
huggingface.api-key=${HUGGINGFACE_API_KEY:}
huggingface.model=${HUGGINGFACE_MODEL:meta-llama/Llama-3.3-70B-Instruct}
huggingface.baseurl=${HUGGINGFACE_BASEURL:https://router.huggingface.co}

# ── Grok (xAI) cloud ──
grok.api-key=${GROK_API_KEY:}
grok.model=${GROK_MODEL:grok-3-mini-fast}
grok.baseurl=${GROK_BASEURL:https://api.x.ai}

# ── Ollama (local fallback) ──
ollama.baseurl=${OLLAMA_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:deepseek-r1:7b}

server.port=${PORT:${SERVER_PORT:8080}}

# ── PostgreSQL (Railway / Render / Heroku compatible) ──
# Priority: DATABASE_URL env var (auto-parsed by EnvironmentPostProcessor) → PGHOST etc. → Railway defaults
spring.datasource.url=jdbc:postgresql://${PGHOST:postgres.railway.internal}:${PGPORT:5432}/${PGDATABASE:railway}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Connection pool ──
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ── Google Sign-In ──
google.client-id=${GOOGLE_CLIENT_ID:}