<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux — Choose Your Interests</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .onboard-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .onboard-card {
            width: 100%;
            max-width: 720px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem 3rem;
            box-shadow: var(--shadow-xl);
        }

        .onboard-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .onboard-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .onboard-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .selection-counter {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .selection-counter span {
            color: var(--accent-primary);
            font-weight: 600;
        }

        .category-section {
            margin-bottom: 1.75rem;
        }

        .category-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.05rem;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .category-title::before {
            content: '';
            display: inline-block;
            width: 3px;
            height: 16px;
            border-radius: 2px;
            background: var(--accent-gradient);
        }

        .topics-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .topic-chip {
            padding: 0.5rem 1rem;
            background: rgba(26, 26, 46, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.25s ease;
            user-select: none;
        }

        .topic-chip:hover {
            border-color: rgba(0, 229, 255, 0.3);
            color: var(--text-primary);
            background: rgba(0, 229, 255, 0.06);
        }

        .topic-chip.selected {
            background: rgba(0, 229, 255, 0.12);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.15);
        }

        .onboard-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 2rem;
            gap: 1rem;
        }

        .btn-continue {
            flex: 1;
            padding: 0.875rem 2rem;
            background: var(--accent-gradient);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0.4;
            pointer-events: none;
        }

        .btn-continue.active {
            opacity: 1;
            pointer-events: all;
        }

        .btn-continue.active:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }

        .btn-skip {
            padding: 0.875rem 1.5rem;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-muted);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-skip:hover {
            border-color: rgba(255, 255, 255, 0.15);
            color: var(--text-secondary);
        }

        .error-msg, .success-msg {
            text-align: center;
            padding: 0.75rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .success-msg {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .onboard-card {
                padding: 1.5rem;
                border-radius: 16px;
            }

            .onboard-header h1 {
                font-size: 1.5rem;
            }

            .topic-chip {
                font-size: 0.8rem;
                padding: 0.4rem 0.75rem;
            }

            .onboard-actions {
                flex-direction: column-reverse;
            }

            .btn-skip, .btn-continue {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="onboard-container">
        <div class="onboard-card">
            <div class="onboard-header">
                <h1>What interests you?</h1>
                <p>Pick at least <strong>3 topics</strong> so Flux can curate your feed. You can always change these later.</p>
            </div>

            <div class="selection-counter">
                <span id="selectedCount">0</span> selected &nbsp;·&nbsp; minimum 3
            </div>

            <div id="errorMsg" class="error-msg hidden"></div>
            <div id="successMsg" class="success-msg hidden"></div>

            <div id="categoriesContainer">
                <!-- Dynamically filled -->
            </div>

            <div class="onboard-actions">
                <button class="btn-skip" id="skipBtn">Skip for now</button>
                <button class="btn-continue" id="continueBtn">Continue</button>
            </div>
        </div>
    </div>

    <script>
        // ── Auth guard ──
        const sessionToken = localStorage.getItem('flux_session_token');
        const storedUser = localStorage.getItem('flux_user');
        if (!sessionToken || !storedUser) {
            window.location.href = '/login.html';
        }

        const selectedTopics = new Set();
        const container = document.getElementById('categoriesContainer');
        const countEl = document.getElementById('selectedCount');
        const continueBtn = document.getElementById('continueBtn');
        const skipBtn = document.getElementById('skipBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        // ── Load interest topics ──
        async function loadTopics() {
            try {
                const res = await fetch('/v1/config/interests');
                const data = await res.json();
                renderCategories(data.categories);
            } catch (e) {
                showError('Failed to load interests. Please refresh.');
            }
        }

        function renderCategories(categories) {
            container.innerHTML = '';
            categories.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'category-section';

                const title = document.createElement('div');
                title.className = 'category-title';
                title.textContent = cat.name;
                section.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'topics-grid';

                cat.topics.forEach(topic => {
                    const chip = document.createElement('div');
                    chip.className = 'topic-chip';
                    chip.textContent = topic;
                    chip.addEventListener('click', () => toggleTopic(chip, topic));
                    grid.appendChild(chip);
                });

                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        function toggleTopic(chip, topic) {
            if (selectedTopics.has(topic)) {
                selectedTopics.delete(topic);
                chip.classList.remove('selected');
            } else {
                selectedTopics.add(topic);
                chip.classList.add('selected');
            }
            updateCount();
        }

        function updateCount() {
            countEl.textContent = selectedTopics.size;
            if (selectedTopics.size >= 3) {
                continueBtn.classList.add('active');
            } else {
                continueBtn.classList.remove('active');
            }
        }

        // ── Save interests ──
        continueBtn.addEventListener('click', async () => {
            if (selectedTopics.size < 3) return;

            continueBtn.textContent = 'Saving...';
            continueBtn.style.pointerEvents = 'none';
            hideMessages();

            try {
                const res = await fetch('/v1/users/interests', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + sessionToken
                    },
                    body: JSON.stringify({ interests: Array.from(selectedTopics) })
                });

                const data = await res.json();

                if (data.status === 'success') {
                    // Update local storage with onboarded user
                    localStorage.setItem('flux_user', JSON.stringify(data.user));
                    showSuccess('Great choices! Loading your feed...');
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 1000);
                } else {
                    showError(data.message || 'Failed to save interests');
                    continueBtn.textContent = 'Continue';
                    continueBtn.style.pointerEvents = '';
                }
            } catch (e) {
                showError('Connection error. Please try again.');
                continueBtn.textContent = 'Continue';
                continueBtn.style.pointerEvents = '';
            }
        });

        // ── Skip ──
        skipBtn.addEventListener('click', async () => {
            // Mark onboarded without interests
            skipBtn.textContent = 'Skipping...';
            try {
                const res = await fetch('/v1/users/interests', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + sessionToken
                    },
                    body: JSON.stringify({ interests: [], skip: true })
                });
                // Even if it fails, let them through
            } catch (e) {
                // ignore
            }
            // Mark onboarded in local user
            try {
                const user = JSON.parse(localStorage.getItem('flux_user'));
                user.onboarded = true;
                localStorage.setItem('flux_user', JSON.stringify(user));
            } catch (e) {}
            window.location.href = '/index.html';
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
            successMsg.classList.add('hidden');
        }

        function showSuccess(msg) {
            successMsg.textContent = msg;
            successMsg.classList.remove('hidden');
            errorMsg.classList.add('hidden');
        }

        function hideMessages() {
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');
        }

        // ── Init ──
        loadTopics();
    </script>
</body>
</html>
